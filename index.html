<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<!-- Last updated: 16/04/2026 13:48 -->
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ספרים יד שניה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Heebo',Arial,sans-serif}
body{background:#0F474B;min-height:100vh;direction:rtl}

/* HEADER */
.header{background:rgba(255,255,255,0.5);padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.4);position:sticky;top:0;z-index:10}
.header h1{font-size:1.4rem;font-weight:900;color:#654B44}
.header p{font-size:.85rem;color:#654B44;font-weight:600;margin-top:2px}

/* PROJECT INFO */
.project-info{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);border:2px solid #FFF;border-radius:16px;padding:12px 16px;margin:12px 16px;text-align:center;color:#fff;font-size:16px;font-weight:500;line-height:1.6}

/* FILTERS */
.controls{padding:8px 12px;background:rgba(255,255,255,0.25);border-bottom:1px solid rgba(255,255,255,0.2);display: flex; justify-content: center;}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:5px 14px;border:2px solid #87a3a5;border-radius:20px;font-size:12px;background:#fffbd7;color:#000;cursor:pointer;transition:.15s;font-family:'Heebo',sans-serif}
.fb.active{background:#654B44;color:white;border-color:#654B44;font-weight:700}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,300px));gap:16px;padding:16px;justify-content:center}
@media(max-width:767px){
  .grid{grid-template-columns:repeat(2,1fr);gap:16px;padding:12px}
}

/* CARD */
.card{background:#D4EDE6;border-radius:16px;overflow:hidden;border:2px solid transparent;display:flex;flex-direction:column;cursor:pointer;transition:border .15s,box-shadow .15s;box-shadow:0 4px 15px rgba(0,0,0,0.15)}
.card.selected{border-color:#27ae60;box-shadow:0 0 0 1px #27ae60}
.card.sold{opacity:0.7}

/* IMAGE CONTAINER */
.img-container{width:100%;aspect-ratio:1/1;position:relative;overflow:hidden;background:#2a2a4a}
.img-container img{width:100%;height:100%;object-fit:cover;display:block}

/* SOLD OVERLAY */
.sold-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;z-index:3}
.sold .sold-overlay{display:flex}
.sold-label{background:#ef4444;color:white;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px}
.sold .img-container img{opacity:0.5}

/* CHECKBOX */
.cb-wrap{position:absolute;top:10px;left:10px;width:24px;height:24px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.7);border-radius:6px;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:4;backdrop-filter:blur(4px)}
.card.selected .cb-wrap{background:#27ae60;border-color:#27ae60}
.cb-check{display:none;color:white;font-size:14px;font-weight:700}
.card.selected .cb-check{display:block}

/* ZOOM BUTTON */
.zoom-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.4);color:white;border:none;border-radius:18px;padding:9px 11px;cursor:pointer;backdrop-filter:blur(4px);font-size:1rem;z-index:4;line-height:1;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{background:rgba(0,0,0,0.65)}

/* OVERLAY TITLE */
.overlay-title{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.55);color:white;padding:16px 12px;font-size:0.95rem;font-weight:600;text-align:right;direction:rtl;z-index:2;line-height:1.3}
@media(max-width:767px){.overlay-title{font-size:0.82rem;padding:6px 8px}}

/* CARD BOTTOM */
.card-body{padding:10px 12px;background:#1a1a2e;display:flex;align-items:center;justify-content:space-between;direction:rtl}
.card-info{display:flex;flex-direction:column;gap:3px;text-align:right;flex:1;min-width:0}
.category-badge{display:inline-block;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);padding:2px 8px;border-radius:4px;font-size:0.72rem;width:fit-content;margin-bottom:2px}
.card-author{font-size:0.8rem;color:rgba(255,255,255,0.6)}
.price-circle{background:#26666B;color:white;width:46px;height:46px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0;margin-right:8px;line-height:1;text-align:center}

/* EMPTY / LOADING */
.empty{text-align:center;padding:3rem;color:#654B44;font-size:14px;grid-column:1/-1;opacity:.7}
.loading{text-align:center;padding:3rem;color:#654B44;font-size:14px;grid-column:1/-1}

/* FAB */
.fab-wrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:100}
.fab-wa{background:#25D366;color:white;border:none;border-radius:30px;padding:13px 26px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;font-family:'Heebo',sans-serif}
.fab-order{background:#654B44;color:white;border:none;border-radius:30px;padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);white-space:nowrap;font-family:'Heebo',sans-serif;display:none}
.fab-order.visible{display:block}
.fab-badge{background:white;color:#16a34a;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-right:4px}
.pb-bottom{height:90px}

/* ORDER MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:16px;padding:1.5rem;max-width:360px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.1rem;margin-bottom:12px;color:#654B44;font-weight:700}
.sel-list{max-height:260px;overflow-y:auto;margin-bottom:12px}
.sel-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #e8f5f0}
.sel-item img{width:44px;height:44px;object-fit:cover;border-radius:8px;flex-shrink:0}
.sel-item-info{flex:1}
.sel-item-title{font-size:13px;font-weight:700;color:#222}
.sel-item-price{font-size:12px;color:#145960}
.sel-item-remove{background:none;border:none;color:#aaa;font-size:18px;cursor:pointer}
.modal-total{font-size:15px;font-weight:700;color:#145960;margin-bottom:16px}
.btn-send-wa{background:linear-gradient(90deg,#25D366,#1da851);color:white;border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;cursor:pointer;font-weight:700;margin-bottom:8px;font-family:'Heebo',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-cancel{background:#f5f5f5;color:#555;border:none;border-radius:10px;padding:10px;width:100%;font-size:14px;cursor:pointer;font-family:'Heebo',sans-serif}

/* ZOOM MODAL */
#zoomModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;align-items:center;justify-content:center}
#zoomModal.open{display:flex}
#zoomModal img{max-width:600px;max-height:90vh;object-fit:contain;border-radius:12px}
@media(max-width:767px){#zoomModal img{width:calc(100vw - 32px);max-width:none}}
.zoom-close{position:absolute;top:20px;right:20px;color:white;font-size:2rem;cursor:pointer;background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;line-height:1}
</style>
</head>
<body>

<div class="header">
  <h1>📚 יריד ספרים דיגיטלי</h1>
  <p>כיתות ו' — בית ספר ויצמן</p>
</div>

<div class="project-info">
כל קנייה היא תרומה למסיבת הסיום של שכבת ו'. תודה על התמיכה!
</div>

<div class="controls">
  <div class="filters" id="filters"></div>
</div>

<div class="grid" id="grid"><p class="loading">⏳ טוענת ספרים...</p></div>

<div class="pb-bottom"></div>

<div class="fab-wrap">
  <button class="fab-order" id="fabOrder" onclick="openOrderModal()">🛒 סיכום הזמנה <span class="fab-badge" id="fabBadge">0</span></button>
  <button class="fab-wa" onclick="handleWaBtn()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.858L.054 23.03a.75.75 0 00.917.917l5.172-1.478A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.9 0-3.68-.524-5.2-1.436l-.373-.22-3.07.877.877-3.07-.22-.373A9.953 9.953 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
    צור קשר
  </button>
</div>

<!-- ORDER MODAL -->
<div class="modal-bg" id="orderModal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">🛒 סיכום הזמנה</h3>
      <button onclick="closeOrderModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa">×</button>
    </div>
    <div class="sel-list" id="orderList"></div>
    <div class="modal-total" id="orderTotal"></div>
    <button class="btn-send-wa" onclick="sendOrderWa()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.858L.054 23.03a.75.75 0 00.917.917l5.172-1.478A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.9 0-3.68-.524-5.2-1.436l-.373-.22-3.07.877.877-3.07-.22-.373A9.953 9.953 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      שלח הזמנה בוואטסאפ
    </button>
    <button class="btn-cancel" onclick="closeOrderModal()">ביטול</button>
  </div>
</div>

<!-- ZOOM MODAL -->
<div id="zoomModal" onclick="closeZoomModal()">
  <button class="zoom-close" onclick="closeZoomModal()">×</button>
  <img id="zoomImg" src="" alt="">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCicKBTwcN1utsOAgKThEHjTAeovt4m_Ys",
  authDomain: "weizmannbook.firebaseapp.com",
  projectId: "weizmannbook",
  storageBucket: "weizmannbook.firebasestorage.app",
  messagingSenderId: "14338690162",
  appId: "1:14338690162:web:10c1f5a931a9f34dd806eb"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const booksCol = collection(db, 'books');

const ALL_CATS = ["הכל","ספרי ילדים","פעוטות","ראשית קריאה","קומיקס","ספרות נוער","ספרי קריאה","משחקים","חוברות לימוד"];
const PHONE = "972544923904";

let books = [];
let activeFilter = "הכל";
let selectedIds = new Set();

function getCats(b){ return Array.isArray(b.cat) ? b.cat : [b.cat]; }
function matchFilter(b){ return activeFilter === "הכל" || getCats(b).includes(activeFilter); }

function buildFilters(){
  document.getElementById('filters').innerHTML = ALL_CATS.map(c =>
    `<button class="fb ${c===activeFilter?'active':''}" onclick="setFilter('${c}',this)">${c}</button>`
  ).join('');
}

function setFilter(cat, el){
  activeFilter = cat;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function cardHtml(b){
  const cats = getCats(b);
  const firstCat = cats[0] || '';
  const selected = selectedIds.has(String(b.id));
  return `
    <div class="card ${b.sold?'sold':''} ${selected?'selected':''}" onclick="toggleSelect('${b.id}')" data-id="${b.id}">
      <div class="img-container">
        <img src="${b.img||''}" alt="${b.title}" loading="lazy">
        <div class="sold-overlay"><span class="sold-label">נמכר</span></div>
        <div class="cb-wrap"><span class="cb-check">✓</span></div>
        <button class="zoom-btn" onclick="event.stopPropagation();openZoomModal('${b.id}')" title="הגדל תמונה">⤢</button>
        <div class="overlay-title">${b.title||'ספר'}</div>
      </div>
      <div class="card-body">
        <div class="card-info">
          <span class="category-badge">${firstCat}</span>
          <span class="card-author">${b.author ? 'מאת: '+b.author : ''}</span>
        </div>
        <div class="price-circle">${b.price}<br>&#8362;</div>
      </div>
    </div>`;
}

function toggleSelect(id){
  const b = books.find(x => String(x.id) === String(id));
  if(!b || b.sold) return;
  if(selectedIds.has(String(id))) selectedIds.delete(String(id));
  else selectedIds.add(String(id));
  updateFab();
  render();
}

function updateFab(){
  const n = selectedIds.size;
  const fabOrder = document.getElementById('fabOrder');
  const badge = document.getElementById('fabBadge');
  badge.textContent = n;
  if(n > 0) fabOrder.classList.add('visible');
  else fabOrder.classList.remove('visible');
}

function handleWaBtn(){
  var msg = encodeURIComponent('אני מעוניינת לרכוש ספר מהיריד. האם תוכלי לעזור לי?');
  window.open('https://wa.me/' + PHONE + '?text=' + msg, '_blank');
}

function openOrderModal(){
  const selected = books.filter(b => selectedIds.has(String(b.id)));
  document.getElementById('orderList').innerHTML = selected.map(b =>
    `<div class="sel-item">
      <img src="${b.img||''}" alt="${b.title}">
      <div class="sel-item-info">
        <div class="sel-item-title">${b.title}</div>
        <div class="sel-item-price">&#8362;${b.price}</div>
      </div>
      <button class="sel-item-remove" onclick="removeFromOrder('${b.id}')">×</button>
    </div>`).join('');
  const total = selected.reduce((s,b) => s+b.price, 0);
  document.getElementById('orderTotal').textContent = 'סה"כ: ₪' + total;
  document.getElementById('orderModal').classList.add('open');
}

function closeOrderModal(){ document.getElementById('orderModal').classList.remove('open'); }

function removeFromOrder(id){
  selectedIds.delete(String(id));
  updateFab();
  render();
  openOrderModal();
}

function sendOrderWa(){
  const selected = books.filter(b => selectedIds.has(String(b.id)));
  const total = selected.reduce((s,b) => s+b.price, 0);
  const parts = selected.map(b => '- ' + b.title + ' (₪' + b.price + ')').join('\n');
  const msg = encodeURIComponent(
    'אני מעוניין לרכוש את הספרים האלו:\n' + parts +
    '\nסה"כ: ₪' + total +
    '\nאנא שלח לי קישור לפייבוקס'
  );
  window.open('https://wa.me/' + PHONE + '?text=' + msg, '_blank');
  closeOrderModal();
}

function openZoomModal(id){
  const b = books.find(x => String(x.id) === String(id));
  if(!b || !b.img) return;
  document.getElementById('zoomImg').src = b.img;
  document.getElementById('zoomModal').classList.add('open');
}

function closeZoomModal(){ document.getElementById('zoomModal').classList.remove('open'); }

function render(){
  const f = books.filter(b => matchFilter(b));
  const grid = document.getElementById('grid');
  grid.innerHTML = f.length ? f.map(b => cardHtml(b)).join('') : '<p class="empty">לא נמצאו ספרים 📭</p>';
}

onSnapshot(booksCol, (snap) => {
  books = snap.docs.map(d => ({...d.data(), id: d.id}));
  books.sort((a,b) => (a.order||0) - (b.order||0));
  buildFilters();
  render();
  updateFab();
});

window.toggleSelect = toggleSelect;
window.setFilter = setFilter;
window.openOrderModal = openOrderModal;
window.closeOrderModal = closeOrderModal;
window.removeFromOrder = removeFromOrder;
window.sendOrderWa = sendOrderWa;
window.openZoomModal = openZoomModal;
window.closeZoomModal = closeZoomModal;
window.handleWaBtn = handleWaBtn;
</script>
</body></html>
