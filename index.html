<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ספרים יד שניה</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#A8C9B8;min-height:100vh;direction:rtl}
.header{background:rgba(255,255,255,0.5);padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.4);position:sticky;top:0;z-index:10}
.header h1{font-size:1.4rem;font-weight:900;color:#654B44}
.header p{font-size:.85rem;color:#654B44;font-weight:600;margin-top:2px}
.controls{padding:10px 12px;background:rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.3)}
.search{width:100%;padding:8px 12px;border:1.5px solid rgba(101,75,68,0.3);border-radius:10px;font-size:14px;background:rgba(255,255,255,0.7);color:#333;margin-bottom:8px}
.search::placeholder{color:#aaa}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:5px 14px;border:1.5px solid rgba(101,75,68,0.4);border-radius:20px;font-size:12px;background:rgba(255,255,255,0.6);color:#654B44;cursor:pointer;transition:.15s}
.fb.active{background:#654B44;color:white;border-color:#654B44;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,280px));gap:16px;padding:12px;justify-content:center}
@media(min-width:500px){.grid{grid-template-columns:repeat(auto-fill,minmax(220px,280px));gap:16px;padding:14px;justify-content:center}}
.card{background:#FFF;border-radius:5px;overflow:hidden;border:5px solid #FFF;display:flex;flex-direction:column;cursor:pointer;transition:border .15s}
.card.selected{border:2px solid #145960;box-shadow:0 0 0 1px #145960}
.card-img-wrap{position:relative}
.card img{width:100%;height:180px;object-fit:cover;display:block}
@media(min-width:500px){.card img{height:180px}}
.sold-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.45);align-items:center;justify-content:center}
.sold .sold-overlay{display:flex}
.sold img{opacity:0.5}
.sold-label{background:#ef4444;color:white;font-size:12px;font-weight:bold;padding:5px 14px;border-radius:20px}
.cb-wrap{position:absolute;top:8px;left:8px;width:22px;height:22px;background:white;border-radius:5px;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;pointer-events:none}
.card.selected .cb-wrap{background:#145960;border-color:#145960}
.cb-check{display:none;color:white;font-size:13px;font-weight:bold}
.card.selected .cb-check{display:block}
.card-body{padding:10px;display:flex;flex-direction:column;flex:1}
.card-body-inner{display:flex;gap:8px;align-items:flex-start;flex-direction:row-reverse}
.card-text{flex:1;min-width:0}
.card-title{font-family:'Inter',Arial,sans-serif;font-size:12px;font-weight:700;color:#5F443D;line-height:normal;min-height:2.8em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.card-author{font-family:'Inter',Arial,sans-serif;font-size:10px;font-weight:400;color:#000;line-height:normal;min-height:1.3em;margin-bottom:5px}
.card-cats{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.cat-tag{font-size:10px;background:#d4ede6;color:#145960;padding:2px 10px;border-radius:10px;font-weight:500;display:flex;align-items:center;justify-content:center}
.price{background:#13595E;color:white;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;text-align:center;line-height:1.2}
.empty{text-align:center;padding:3rem;color:#654B44;font-size:14px;grid-column:1/-1;opacity:.7}
.loading{text-align:center;padding:3rem;color:#654B44;font-size:14px;grid-column:1/-1}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:16px;padding:1.5rem;max-width:360px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1rem;margin-bottom:12px;color:#654B44}
.sel-list{max-height:260px;overflow-y:auto;margin-bottom:12px}
.sel-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #e8f5f0}
.sel-item img{width:44px;height:44px;object-fit:cover;border-radius:8px;flex-shrink:0}
.sel-item-info{flex:1}
.sel-item-title{font-size:13px;font-weight:bold;color:#222}
.sel-item-price{font-size:12px;color:#145960}
.sel-item-remove{background:none;border:none;color:#aaa;font-size:18px;cursor:pointer}
.fab-wrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:100}
.fab-paybox{background:#654B44;color:white;border:none;border-radius:30px;padding:11px 22px;font-size:13px;font-weight:bold;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);white-space:nowrap}
.fab-contact{background:#25D366;color:white;border:none;border-radius:30px;padding:13px 26px;font-size:14px;font-weight:bold;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);display:none;align-items:center;gap:8px}
.fab-contact.visible{display:flex}
.fab-badge{background:white;color:#16a34a;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center}
.pb-bottom{height:80px}
</style>
</head>
<body>
<div class="header"><h1>📚 יריד ספרים דיגיטלי</h1><p>כיתות ו' — בית ספר ויצמן</p></div>
<div class="controls">
  <input class="search" type="text" id="search" placeholder="🔍 חיפוש ספר..." oninput="render()">
  <div class="filters" id="filters"></div>
</div>
<div class="grid" id="grid"><p class="loading">⏳ טוענת ספרים...</p></div>

<div class="pb-bottom"></div>
<div class="fab-wrap">
  <div id="fabSelectedRow" style="display:none;align-items:center;gap:8px">
    <button class="fab-paybox" onclick="openPayboxModal()">💳 שלמו בפייבוקס</button>
    <button class="fab-contact" id="fabContact" onclick="openWaModal()">
      💬 צור קשר <span class="fab-badge" id="fabBadge">0</span>
    </button>
  </div>
  <button class="fab-contact" onclick="sendWaDirect()" style="display:flex">💬 צור קשר</button>
</div>

<div class="modal-bg" id="waModal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">ספרים שבחרת</h3>
      <button onclick="closeWaModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa">×</button>
    </div>
    <div class="sel-list" id="waList"></div>
    <div id="waTotal" style="font-size:14px;font-weight:bold;color:#7c2fa0;margin-bottom:14px"></div>
    <button onclick="sendWa()" style="background:linear-gradient(90deg,#25D366,#1da851);color:white;border:none;border-radius:10px;padding:13px;width:100%;font-size:15px;cursor:pointer;font-weight:bold;margin-bottom:8px">💬 שלח הודעה בוואטסאפ</button>
    <button onclick="closeWaModal()" style="background:#f5f5f5;color:#555;border:none;border-radius:10px;padding:10px;width:100%;font-size:14px;cursor:pointer">ביטול</button>
  </div>
</div>
<div class="modal-bg" id="payboxModal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0">סיכום הזמנה</h3>
      <button onclick="closePayboxModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa">×</button>
    </div>
    <div class="sel-list" id="payboxList"></div>
    <div id="payboxEmpty" style="display:none;text-align:center;padding:1.5rem;color:#aaa;font-size:14px">לא נבחרו ספרים</div>
    <div id="payboxTotal" style="font-size:15px;font-weight:bold;color:#7c2fa0;margin:10px 0 16px"></div>
    <a href="https://links.payboxapp.com/NYpvcqJUkZb" target="_blank" id="payboxBtn"
       style="display:flex;align-items:center;justify-content:center;gap:10px;background:#0a5af5;color:white;text-decoration:none;border-radius:12px;padding:14px;font-size:15px;font-weight:bold;margin-bottom:10px" onclick="closePayboxModal()">
      <svg width="22" height="22" viewBox="0 0 40 40"><rect width="40" height="40" rx="10" fill="white"/><text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-size="18" font-weight="bold" fill="#0a5af5">P</text></svg>
      שלמו בפייבוקס
    </a>
    <button onclick="sendWaFromPaybox()" style="display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(90deg,#25D366,#1da851);color:white;border:none;border-radius:12px;padding:13px;width:100%;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:8px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.858L.054 23.03a.75.75 0 00.917.917l5.172-1.478A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.9 0-3.68-.524-5.2-1.436l-.373-.22-3.07.877.877-3.07-.22-.373A9.953 9.953 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      צור קשר בוואטסאפ
    </button>
    <button onclick="closePayboxModal()" style="background:#f5f5f5;color:#555;border:none;border-radius:10px;padding:10px;width:100%;font-size:13px;cursor:pointer">ביטול</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCicKBTwcN1utsOAgKThEHjTAeovt4m_Ys",
  authDomain: "weizmannbook.firebaseapp.com",
  projectId: "weizmannbook",
  storageBucket: "weizmannbook.firebasestorage.app",
  messagingSenderId: "14338690162",
  appId: "1:14338690162:web:10c1f5a931a9f34dd806eb"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const booksCol = collection(db, 'books');


const CATS = ["ספרי ילדים", "פעוטות", "ראשית קריאה", "קומיקס", "חוברות לימוד אנגלית", "משחקים"];
const ALL_CATS = ["הכל", "ספרי ילדים", "פעוטות", "ראשית קריאה", "קומיקס", "חוברות לימוד אנגלית", "משחקים"];
const PHONE = "972544923904";

let books = [];
let activeFilter = "הכל";
let selectedIds = new Set();

function getCats(b){ return Array.isArray(b.cat) ? b.cat : [b.cat]; }
function matchFilter(b){ return activeFilter === "הכל" || getCats(b).includes(activeFilter); }

function buildFilters(id){
  document.getElementById(id).innerHTML = ALL_CATS.map(c =>
    `<button class="fb ${c===activeFilter?'active':''}" onclick="setFilter('${c}',this)">${c}</button>`
  ).join('');
}
function setFilter(cat, el){
  activeFilter = cat;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function cardHtml(b, isAdmin){
  const cats = getCats(b);
  const catTags = cats.map(c => `<span class="cat-tag">${c}</span>`).join('');
  const selected = selectedIds.has(String(b.id));
  return `
    <div class="card ${b.sold?'sold':''} ${selected?'selected':''}" onclick="toggleSelect('${b.id}')">
      <div class="card-img-wrap">
        <img src="${b.img||''}" alt="${b.title}" loading="lazy">
        <div class="sold-overlay"><span class="sold-label">נמכר</span></div>
        <div class="cb-wrap"><span class="cb-check">✓</span></div>
      </div>
      <div class="card-body">
        <div class="card-body-inner">
          <div class="card-text">
            <div class="card-title">${b.title||'ספר'}</div>
            <div class="card-author">${b.author||''}</div>
            <div class="card-cats">${catTags}</div>
          </div>
          <div class="price">${b.price}<br>&#8362;</div>
        </div>
      </div>
    </div>`;
}

function toggleSelect(id){
  const b = books.find(x => String(x.id) === String(id));
  if(!b || b.sold) return;
  if(selectedIds.has(String(id))) selectedIds.delete(String(id));
  else selectedIds.add(String(id));
  updateFab();
  render();
}
function updateFab(){
  const fab = document.getElementById('fabContact');
  const badge = document.getElementById('fabBadge');
  if(!fab) return;
  const n = selectedIds.size;
  if(n > 0){ fab.classList.add('visible'); badge.textContent = n; }
  else fab.classList.remove('visible');
}

function openWaModal(){
  const selected = books.filter(b => selectedIds.has(String(b.id)));
  document.getElementById('waList').innerHTML = selected.map(b =>
    `<div class="sel-item">
      <img src="${b.img||''}" alt="${b.title}">
      <div class="sel-item-info"><div class="sel-item-title">${b.title}</div><div class="sel-item-price">&#8362;${b.price}</div></div>
      <button class="sel-item-remove" onclick="toggleSelect('${b.id}')">×</button>
    </div>`).join('');
  const total = selected.reduce((s,b) => s+b.price, 0);
  document.getElementById('waTotal').textContent = 'סה"כ: &#8362;' + total;
  document.getElementById('waModal').classList.add('open');
}
function closeWaModal(){ document.getElementById('waModal').classList.remove('open'); }

function sendWa(){
  var selected = books.filter(function(b){ return selectedIds.has(String(b.id)); });
  var parts = selected.map(function(b){ return encodeURIComponent('- ' + b.title + ' (₪' + b.price + ')'); });
  var header = encodeURIComponent('היי! אני מעוניינת לרכוש את הספרים הבאים:');
  var footer = encodeURIComponent('האם הם עדיין זמינים?');
  window.open('https://wa.me/' + PHONE + '?text=' + header + '%0A' + parts.join('%0A') + '%0A' + footer, '_blank');
  closeWaModal();
}

function openPayboxModal(){
  const selected = books.filter(b => selectedIds.has(String(b.id)));
  const list = document.getElementById('payboxList');
  const empty = document.getElementById('payboxEmpty');
  const totalEl = document.getElementById('payboxTotal');
  const btn = document.getElementById('payboxBtn');
  if(selected.length === 0){
    list.style.display='none'; empty.style.display='block';
    totalEl.style.display='none'; btn.style.opacity='0.5'; btn.style.pointerEvents='none';
  } else {
    list.style.display='block'; empty.style.display='none';
    totalEl.style.display='block'; btn.style.opacity='1'; btn.style.pointerEvents='auto';
    list.innerHTML = selected.map(b =>
      `<div class="sel-item">
        <img src="${b.img||''}" alt="${b.title}">
        <div class="sel-item-info"><div class="sel-item-title">${b.title}</div><div class="sel-item-price">&#8362;${b.price}</div></div>
      </div>`).join('');
    const total = selected.reduce((s,b) => s+b.price, 0);
    totalEl.textContent = 'סה"כ: ₪' + total;
  }
  document.getElementById('payboxModal').classList.add('open');
}
function closePayboxModal(){ document.getElementById('payboxModal').classList.remove('open'); }

function sendWaFromPaybox(){
  var selected = books.filter(function(b){ return selectedIds.has(String(b.id)); });
  var parts = selected.map(function(b){ return encodeURIComponent('- ' + b.title + ' (₪' + b.price + ')'); });
  var header = encodeURIComponent('היי! אני מעוניינת לרכוש את הספרים הבאים:');
  var footer = encodeURIComponent('האם הם עדיין זמינים?');
  window.open('https://wa.me/' + PHONE + '?text=' + header + '%0A' + parts.join('%0A') + '%0A' + footer, '_blank');
  closePayboxModal();
}


function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const f = books.filter(b => matchFilter(b) && (!q || b.title.includes(q) || (b.author||'').includes(q)));
  const grid = document.getElementById('grid');
  grid.innerHTML = f.length ? f.map(b => cardHtml(b, false)).join('') : '<p class="empty">לא נמצאו ספרים 📭</p>';
}

// Listen to Firestore in real-time
onSnapshot(booksCol, (snap) => {
  books = snap.docs.map(d => ({...d.data(), id: d.id}));
  books.sort((a,b) => (a.order||0) - (b.order||0));
  buildFilters('filters');
  render();
  updateFab();
});

window.toggleSelect = toggleSelect;
window.openWaModal = openWaModal;
window.closeWaModal = closeWaModal;
window.sendWa = sendWa;
window.openPayboxModal = openPayboxModal;
window.closePayboxModal = closePayboxModal;
window.sendWaFromPaybox = sendWaFromPaybox;
window.setFilter = setFilter;
window.sendWaDirect = sendWaDirect;
window.openPayboxModal = openPayboxModal;
window.openWaModal = openWaModal;
window.closeWaModal = closeWaModal;
window.closePayboxModal = closePayboxModal;
window.sendWa = sendWa;
window.sendWaFromPaybox = sendWaFromPaybox;
window.toggleSelect = toggleSelect;
</script>
<script>
function sendWaDirect(){
  var msg=encodeURIComponent('היי! אני מעוניינת לרכוש ספר מהיריד. האם תוכלי לעזור לי?');
  window.open('https://wa.me/972544923904?text='+msg,'_blank');
}
// Expose module functions to global scope after module loads
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    ['openPayboxModal','closePayboxModal','openWaModal','closeWaModal',
     'sendWa','sendWaFromPaybox','toggleSelect','setFilter',
     'sendWaDirect'].forEach(function(fn) {
      if(typeof window[fn] === 'undefined') {
        console.warn('Missing global:', fn);
      }
    });
  }, 2000);
});
</script>
</body></html>
