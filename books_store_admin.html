<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ניהול ספרים - שכבת ו'</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: Arial, sans-serif; 
            min-height: 100vh; 
            background: linear-gradient(135deg,#1a5276 0%,#2471a3 40%,#148f77 100%); 
            direction: rtl; 
            padding-bottom: 50px;
        }
        .header { 
            background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); 
            padding: 1.2rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.25); 
            position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; color: white;
        }
        .admin-actions { display: flex; gap: 10px; padding: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { 
            padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-add { background: #27ae60; color: white; }
        .btn-sort { background: #f39c12; color: white; }
        .btn-save-sort { background: #e67e22; color: white; display: none; }
        .btn-cancel-sort { background: #95a5a6; color: white; display: none; }

        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding: 15px; }
        .book-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; }
        .book-card .img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #eee; }
        .book-card img { width: 100%; height: 100%; object-fit: cover; }
        .book-card .info { padding: 12px; text-align: right; position: relative; }
        .book-card .title { font-weight: bold; font-size: 1.1rem; color: #2c3e50; }
        .book-card .author { font-size: 0.9rem; color: #7f8c8d; margin-top: 4px; }
        .price-badge { position: absolute; bottom: 12px; left: 12px; background: #27ae60; color: white; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .card-actions { display: flex; justify-content: space-around; padding: 10px; background: #f9f9f9; border-top: 1px solid #eee; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2rem; }

        /* הגדרות מצב גרירה */
        .sort-handle { display: none; position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 8px 12px; border-radius: 5px; cursor: grab; z-index: 50; font-size: 1.2rem; }
        body.is-sorting .sort-handle { display: block; }
        body.is-sorting .card-actions { pointer-events: none; opacity: 0.5; }
        body.is-sorting .book-card { border: 2px dashed #f39c12; }

        @media (max-width: 600px) {
            .book-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .book-card .title { font-size: 0.9rem; }
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 15px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }

        #auth-overlay { position: fixed; inset: 0; background: #2c3e50; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #identStatus { text-align: center; font-size: 14px; color: #e67e22; padding: 10px; display: none; font-weight: bold; }
        .thumb-preview { width: 100%; height: 150px; object-fit: contain; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h2>🔒 כניסת מנהלת</h2>
    <input type="password" id="pass-input" placeholder="סיסמה" style="padding:10px; border-radius:8px; margin: 20px 0; text-align: center;">
    <button class="btn btn-add" onclick="checkPass()">כניסה</button>
</div>

<header class="header">
    <h1>⚙️ ניהול היריד</h1>
</header>

<div class="admin-actions">
    <button class="btn btn-add" onclick="document.getElementById('add-modal').style.display='flex'">➕ הוסף ספר</button>
    <button class="btn btn-sort" id="btn-start-sort" onclick="startSorting()">🔃 סידור ידני</button>
    <button class="btn btn-save-sort" id="btn-save-sort" onclick="saveNewOrder()">✅ שמור סדר</button>
    <button class="btn btn-cancel-sort" id="btn-cancel-sort" onclick="location.reload()">ביטול</button>
</div>

<div id="books-container" class="book-grid"></div>

<div id="add-modal" class="modal">
    <div class="modal-content">
        <h3>➕ הוספת ספר</h3>
        <label for="fileInput" style="cursor: pointer; background: #f0fdf4; padding: 20px; display: block; border-radius: 10px; border: 2px dashed #27ae60; text-align: center; margin-bottom: 15px;">
            📸 צלמי כריכה לזיהוי אוטומטי
        </label>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this.files[0])">
        <div id="identStatus">⏳ ממתין לתשובה מקלוד...</div>
        <img id="previewImg" class="thumb-preview" style="display:none;">
        
        <div class="form-group"><input type="text" id="newTitle" placeholder="שם הספר (חובה)"></div>
        <div class="form-group"><input type="text" id="newAuthor" placeholder="סופר/ת"></div>
        <div class="form-group"><input type="number" id="newPrice" value="10" placeholder="מחיר"></div>
        <div class="form-group">
            <select id="newCategory">
                <option>ספרי ילדים</option><option>פעוטות</option><option>ראשית קריאה</option>
                <option>קומיקס</option><option>ספרות נוער</option><option>ספרי קריאה (למבוגרים)</option>
                <option>משחקים</option><option>חוברות לימוד</option>
            </select>
        </div>
        <button class="btn btn-add" style="width: 100%;" onclick="addOneBook()">שמור לחנות</button>
        <button class="btn" style="width: 100%; margin-top: 10px;" onclick="document.getElementById('add-modal').style.display='none'">ביטול</button>
    </div>
</div>

<script>
    window.checkPass = function() {
        if(document.getElementById('pass-input').value === '1177') {
            document.getElementById('auth-overlay').style.display = 'none';
        } else { alert('סיסמה שגויה'); }
    };
    var currentImgB64 = "";
    var isSortingActive = false; // משתנה שמונע ריענון מסך בזמן גרירה
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, addDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCicKBTwcN1utsOAgKThEHjTAeovt4m_Ys",
        authDomain: "weizmannbook.firebaseapp.com",
        projectId: "weizmannbook",
        storageBucket: "weizmannbook.firebasestorage.app",
        messagingSenderId: "14338690162",
        appId: "1:14338690162:web:10c1f5a931a9f34dd806eb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const booksCol = collection(db, 'books');

    // טעינת נתונים - הוספנו הגנה מפני ריענון בזמן גרירה
    onSnapshot(query(booksCol, orderBy("orderIndex", "asc")), (snap) => {
        if (isSortingActive) return; // עצור הכל אם אנחנו באמצע סידור ספרים

        const container = document.getElementById('books-container');
        container.innerHTML = snap.docs.map(d => {
            const b = d.data();
            return `
            <div class="book-card" data-id="${d.id}">
                <div class="sort-handle">⠿</div>
                <div class="img-container"><img src="${b.img || ''}"></div>
                <div class="info">
                    <div class="title">${b.title}</div>
                    <div class="author">${b.author || ''}</div>
                    <div class="price-badge">${b.price} ₪</div>
                </div>
                <div class="card-actions">
                    <button class="btn-icon" onclick="deleteBook('${d.id}')">🗑️</button>
                    <button class="btn-icon" onclick="toggleSold('${d.id}', ${b.sold})">${b.sold ? '✅' : '🏷️'}</button>
                </div>
            </div>`;
        }).join('');
    });

    window.addOneBook = async function() {
        const title = document.getElementById('newTitle').value;
        if(!title) return alert('חובה שם ספר');
        await addDoc(booksCol, {
            title, author: document.getElementById('newAuthor').value,
            price: Number(document.getElementById('newPrice').value),
            cat: [document.getElementById('newCategory').value],
            img: currentImgB64, sold: false, orderIndex: Date.now()
        });
        document.getElementById('add-modal').style.display='none';
        currentImgB64 = ""; // איפוס תמונה
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('newTitle').value = '';
        document.getElementById('newAuthor').value = '';
    };

    window.deleteBook = async (id) => { if(confirm('למחוק?')) await deleteDoc(doc(db,'books',id)); };
    window.toggleSold = async (id, s) => { await updateDoc(doc(db,'books',id), {sold: !s}); };

    window.startSorting = () => {
        isSortingActive = true; // נועל את הריענון של Firebase
        document.body.classList.add('is-sorting');
        document.getElementById('btn-start-sort').style.display='none';
        document.getElementById('btn-save-sort').style.display='flex';
        document.getElementById('btn-cancel-sort').style.display='flex';
        
        Sortable.create(document.getElementById('books-container'), { 
            handle: '.sort-handle', 
            animation: 150,
            ghostClass: 'sortable-ghost'
        });
    };

    window.saveNewOrder = async () => {
        const batch = writeBatch(db);
        Array.from(document.querySelectorAll('.book-card')).forEach((el, i) => {
            batch.update(doc(db, 'books', el.dataset.id), { orderIndex: i });
        });
        await batch.commit();
        isSortingActive = false;
        location.reload();
    };

    // טיפול בתמונה וקריאה לקלוד
    window.handleFile = async (f) => {
        if(!f) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            currentImgB64 = e.target.result;
            document.getElementById('previewImg').src = currentImgB64;
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('identStatus').style.display = 'block';
            document.getElementById('identStatus').innerText = "⏳ ממתין לתשובה מקלוד...";
            
            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // כאן צריך לשים את המפתח החדש שלך!
                        'x-api-key': 'פה_להכניס_את_המפתח_החדש_של_קלוד',
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: "claude-3-haiku-20240307", max_tokens: 100,
                        messages: [{role: "user", content: [{type:"image", source:{type:"base64", media_type:"image/jpeg", data:currentImgB64.split(',')[1]}}, {type:"text", text:"Return ONLY JSON: {\"title\":\"...\",\"author\":\"...\"}"}]}]
                    })
                });
                
                if (!res.ok) {
                    throw new Error(`שגיאת שרת מקלוד: ${res.status}. (בדקי אם מפתח ה-API שלך תקין)`);
                }

                const data = await res.json();
                const text = data.content[0].text;
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}')+1));
                
                document.getElementById('newTitle').value = json.title;
                document.getElementById('newAuthor').value = json.author;
                document.getElementById('identStatus').innerText = "✅ זוהה בהצלחה!";
                setTimeout(() => { document.getElementById('identStatus').style.display = 'none'; }, 3000);

            } catch(e) { 
                console.error(e); 
                document.getElementById('identStatus').innerText = "❌ הוספת אוטומטית נכשלה: " + e.message;
                alert("שגיאה בזיהוי התמונה: " + e.message + "\n\nנא להזין את פרטי הספר ידנית.");
            }
        };
        reader.readAsDataURL(f);
    };
</script>
</body>
</html>
