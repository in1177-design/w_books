<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ניהול ספרים - שכבת ו' ויצמן</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: Arial, sans-serif; 
            min-height: 100vh; 
            background: linear-gradient(135deg,#1a5276 0%,#2471a3 40%,#148f77 100%); 
            direction: rtl; 
            padding-bottom: 50px;
        }

        .header { 
            background: rgba(255,255,255,0.15); 
            backdrop-filter: blur(8px); 
            padding: 1.2rem 1.5rem; 
            border-bottom: 1px solid rgba(255,255,255,0.25); 
            position: sticky; top: 0; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 1.5rem; color: white; }

        /* כפתורי בקרה עליונים */
        .admin-actions { display: flex; gap: 10px; padding: 1rem; justify-content: center; }
        .btn { 
            padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-add { background: #27ae60; color: white; }
        .btn-sort { background: #f39c12; color: white; }
        .btn-save-sort { background: #e67e22; color: white; display: none; }
        .btn-cancel-sort { background: #95a5a6; color: white; display: none; }

        /* גריד ספרים */
        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 15px; padding: 15px; 
        }

        /* כרטיסיית ספר מעודכנת */
        .book-card { 
            background: white; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }
        
        /* תמונה ריבועית */
        .book-card .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #eee;
        }
        .book-card img { width: 100%; height: 100%; object-fit: cover; }

        /* פרטי ספר - טקסט לימין, מחיר לשמאל */
        .book-card .info { padding: 12px; text-align: right; position: relative; }
        .book-card .title { font-weight: bold; font-size: 1.1rem; color: #2c3e50; }
        .book-card .author { font-size: 0.9rem; color: #7f8c8d; margin-top: 4px; }
        
        .price-badge { 
            position: absolute; bottom: 12px; left: 12px; /* מחיר בצד שמאל */
            background: #27ae60; color: white; padding: 4px 10px; 
            border-radius: 20px; font-weight: bold; font-size: 0.9rem;
        }

        .card-actions { 
            display: flex; justify-content: space-around; padding: 10px; 
            background: #f9f9f9; border-top: 1px solid #eee;
        }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2rem; }

        /* מצב עריכת סדר */
        .sort-handle { 
            display: none; position: absolute; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.6); color: white; padding: 5px; 
            border-radius: 5px; cursor: grab; z-index: 5;
        }
        body.is-sorting .sort-handle { display: block; }
        body.is-sorting .card-actions { pointer-events: none; opacity: 0.5; }
        body.is-sorting .book-card { cursor: move; border: 2px dashed #f39c12; }

        /* מובייל - 2 בשורה */
        @media (max-width: 600px) {
            .book-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .book-card .title { font-size: 0.9rem; }
            .book-card .author { font-size: 0.8rem; }
        }

        /* מודלים וטפסים */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; 
        }
        .modal-content { background: white; padding: 2rem; border-radius: 15px; width: 90%; max-width: 450px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }

        /* כניסה / הגנה */
        #auth-overlay { 
            position: fixed; inset: 0; background: #2c3e50; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h2>🔒 כניסת מנהלת</h2>
    <p style="margin: 15px 0;">הזיני סיסמה כדי לנהל את הספרים</p>
    <input type="password" id="pass-input" style="padding:10px; border-radius:8px; border:none; margin-bottom:10px;">
    <button class="btn btn-add" onclick="checkPass()">כניסה</button>
</div>

<header class="header">
    <div>
        <h1>⚙️ ניהול יריד ספרים</h1>
        <p>שכבת ו' - ויצמן</p>
    </div>
</header>

<div class="admin-actions">
    <button class="btn btn-add" onclick="document.getElementById('add-modal').style.display='flex'">➕ הוסף ספר</button>
    <button class="btn btn-sort" id="btn-start-sort" onclick="startSorting()">🔃 סידור ידני</button>
    <button class="btn btn-save-sort" id="btn-save-sort" onclick="saveNewOrder()">✅ שמור סדר</button>
    <button class="btn btn-cancel-sort" id="btn-cancel-sort" onclick="cancelSorting()">ביטול</button>
</div>

<div id="books-container" class="book-grid">
    </div>

<div id="add-modal" class="modal">
    <div class="modal-content">
        <h3>➕ הוסף ספר חדש</h3>
        <div class="form-group" style="text-align: center;">
            <label for="img-upload" style="cursor: pointer; background: #eee; padding: 20px; display: block; border-radius: 10px;">
                📸 לחצי לבחירת תמונה (ה-OCR יזהה פרטים)
            </label>
            <input type="file" id="img-upload" hidden accept="image/*" onchange="handleImageUpload(event)">
        </div>
        <div class="form-group">
            <label>שם הספר</label>
            <input type="text" id="new-title">
        </div>
        <div class="form-group">
            <label>סופר/ת</label>
            <input type="text" id="new-author">
        </div>
        <div class="form-group">
            <label>מחיר ₪</label>
            <input type="number" id="new-price" value="15">
        </div>
        <div class="form-group">
            <label>קטגוריה</label>
            <select id="new-category">
                <option>ספרי ילדים</option>
                <option>פעוטות</option>
                <option>ראשית קריאה</option>
                <option>קומיקס</option>
                <option>ספרות נוער</option>
                <option>ספרי קריאה (למבוגרים)</option>
                <option>משחקים</option>
                <option>חוברות לימוד</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-add" style="flex: 1;" onclick="addNewBook()">הוסף לחנות</button>
            <button class="btn btn-cancel-sort" style="display: block;" onclick="document.getElementById('add-modal').style.display='none'">ביטול</button>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <h3>✏️ עריכת ספר</h3>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>שם הספר</label>
            <input type="text" id="edit-title">
        </div>
        <div class="form-group">
            <label>סופר/ת</label>
            <input type="text" id="edit-author">
        </div>
        <div class="form-group">
            <label>מחיר</label>
            <input type="number" id="edit-price">
        </div>
        <div class="form-group">
            <label>קטגוריה</label>
            <select id="edit-category">
                <option>ספרי ילדים</option>
                <option>פעוטות</option>
                <option>ראשית קריאה</option>
                <option>קומיקס</option>
                <option>ספרות נוער</option>
                <option>ספרי קריאה (למבוגרים)</option>
                <option>משחקים</option>
                <option>חוברות לימוד</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-add" style="flex: 1;" onclick="saveEdit()">שמור שינויים</button>
            <button class="btn btn-cancel-sort" style="display: block;" onclick="document.getElementById('edit-modal').style.display='none'">ביטול</button>
        </div>
    </div>
</div>

<script type="module">
    // הגדרות Firebase - יש להשתמש בהגדרות שלך מהקוד המקורי
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, addDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    // נסי להדביק כאן את ה-firebaseConfig מהקוד המקורי שלך
    const firebaseConfig = {
        // ... הקונפיגורציה שלך כאן ...
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    let sortableInstance = null;

    // טעינת ספרים מסודרת לפי orderIndex
    const q = query(collection(db, "books"), orderBy("orderIndex", "asc"));
    onSnapshot(q, (snapshot) => {
        const books = [];
        snapshot.forEach(doc => books.push({ id: doc.id, ...doc.data() }));
        renderBooks(books);
    });

    function renderBooks(books) {
        const container = document.getElementById('books-container');
        container.innerHTML = books.map(book => `
            <div class="book-card" data-id="${book.id}">
                <div class="sort-handle">⠿</div>
                <div class="img-container">
                    <img src="${book.image}" alt="${book.title}">
                </div>
                <div class="info">
                    <div class="title">${book.title}</div>
                    <div class="author">${book.author}</div>
                    <div class="price-badge">${book.price} ₪</div>
                </div>
                <div class="card-actions">
                    <button class="btn-icon" onclick="openEditModal('${book.id}', '${book.title}', '${book.author}', ${book.price}, '${book.category}')">✏️</button>
                    <button class="btn-icon" onclick="deleteBook('${book.id}')">🗑️</button>
                    <button class="btn-icon" onclick="toggleSold('${book.id}', ${book.isSold})">${book.isSold ? '✅' : '🏷️'}</button>
                </div>
            </div>
        `).join('');
    }

    // פונקציות מצב עריכת סדר
    window.startSorting = function() {
        document.body.classList.add('is-sorting');
        document.getElementById('btn-start-sort').style.display = 'none';
        document.getElementById('btn-save-sort').style.display = 'flex';
        document.getElementById('btn-cancel-sort').style.display = 'flex';
        
        const el = document.getElementById('books-container');
        sortableInstance = Sortable.create(el, {
            handle: '.sort-handle',
            animation: 150,
            ghostClass: 'sortable-ghost'
        });
    };

    window.cancelSorting = function() {
        location.reload(); // פתרון פשוט לביטול שינויי גרירה
    };

    window.saveNewOrder = async function() {
        const container = document.getElementById('books-container');
        const cards = Array.from(container.querySelectorAll('.book-card'));
        const batch = writeBatch(db);
        
        cards.forEach((card, index) => {
            const bookRef = doc(db, "books", card.dataset.id);
            batch.update(bookRef, { orderIndex: index });
        });

        try {
            await batch.commit();
            alert("הסדר החדש נשמר בהצלחה!");
            document.body.classList.remove('is-sorting');
            location.reload();
        } catch (e) {
            alert("שגיאה בשמירת הסדר: " + e.message);
        }
    };

    // פונקציות ניהול (הוספה, עריכה, מחיקה) - מבוסס על הקוד שלך
    window.checkPass = function() {
        if(document.getElementById('pass-input').value === '1177') {
            document.getElementById('auth-overlay').style.display = 'none';
        } else {
            alert('סיסמה שגויה');
        }
    };

    window.deleteBook = async function(id) {
        if(confirm('למחוק את הספר?')) {
            await deleteDoc(doc(db, "books", id));
        }
    };

    window.openEditModal = function(id, title, author, price, category) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-title').value = title;
        document.getElementById('edit-author').value = author;
        document.getElementById('edit-price').value = price;
        document.getElementById('edit-category').value = category;
        document.getElementById('edit-modal').style.display = 'flex';
    };

    window.saveEdit = async function() {
        const id = document.getElementById('edit-id').value;
        const ref = doc(db, "books", id);
        await updateDoc(ref, {
            title: document.getElementById('edit-title').value,
            author: document.getElementById('edit-author').value,
            price: Number(document.getElementById('edit-price').value),
            category: document.getElementById('edit-category').value
        });
        document.getElementById('edit-modal').style.display = 'none';
    };

    // ... כאן נשארת הפונקציה handleImageUpload וה-OCR מהקוד המקורי שלך ...

</script>
</body>
</html>
