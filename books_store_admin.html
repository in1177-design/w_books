<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ניהול ספרים - שכבת ו' ויצמן</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: Arial, sans-serif; 
            min-height: 100vh; 
            background: linear-gradient(135deg,#1a5276 0%,#2471a3 40%,#148f77 100%); 
            direction: rtl; 
            padding-bottom: 50px;
        }

        .header { 
            background: rgba(255,255,255,0.15); 
            backdrop-filter: blur(8px); 
            padding: 1.2rem 1.5rem; 
            border-bottom: 1px solid rgba(255,255,255,0.25); 
            position: sticky; top: 0; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 1.5rem; color: white; }

        /* כפתורי בקרה עליונים */
        .admin-actions { display: flex; gap: 10px; padding: 1rem; justify-content: center; }
        .btn { 
            padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-add { background: #27ae60; color: white; }
        .btn-sort { background: #f39c12; color: white; }
        .btn-save-sort { background: #e67e22; color: white; display: none; }
        .btn-cancel-sort { background: #95a5a6; color: white; display: none; }

        /* גריד ספרים */
        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 15px; padding: 15px; 
        }

        /* כרטיסיית ספר מעודכנת */
        .book-card { 
            background: white; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }
        
        /* תמונה ריבועית */
        .book-card .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #eee;
        }
        .book-card img { width: 100%; height: 100%; object-fit: cover; }

        /* פרטי ספר - טקסט לימין, מחיר לשמאל */
        .book-card .info { padding: 12px; text-align: right; position: relative; }
        .book-card .title { font-weight: bold; font-size: 1.1rem; color: #2c3e50; }
        .book-card .author { font-size: 0.9rem; color: #7f8c8d; margin-top: 4px; }
        
        .price-badge { 
            position: absolute; bottom: 12px; left: 12px;
            background: #27ae60; color: white; padding: 4px 10px; 
            border-radius: 20px; font-weight: bold; font-size: 0.9rem;
        }

        .card-actions { 
            display: flex; justify-content: space-around; padding: 10px; 
            background: #f9f9f9; border-top: 1px solid #eee;
        }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2rem; }

        /* מצב עריכת סדר */
        .sort-handle { 
            display: none; position: absolute; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.6); color: white; padding: 5px; 
            border-radius: 5px; cursor: grab; z-index: 5;
        }
        body.is-sorting .sort-handle { display: block; }
        body.is-sorting .card-actions { pointer-events: none; opacity: 0.5; }
        body.is-sorting .book-card { cursor: move; border: 2px dashed #f39c12; }

        /* מובייל - 2 בשורה */
        @media (max-width: 600px) {
            .book-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .book-card .title { font-size: 0.9rem; }
            .book-card .author { font-size: 0.8rem; }
        }

        /* מודלים וטפסים */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; 
        }
        .modal-content { background: white; padding: 2rem; border-radius: 15px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }

        /* כניסה / הגנה */
        #auth-overlay { 
            position: fixed; inset: 0; background: #2c3e50; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        #identStatus {
            text-align: center;
            font-size: 12px;
            color: #654B44;
            padding: 6px;
            background: #f0faf6;
            border-radius: 8px;
            margin-bottom: 8px;
            display: none;
        }

        .thumb-wrap { position: relative; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        .thumb-wrap img { width: 100%; height: 150px; object-fit: cover; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h2>🔒 כניסת מנהלת</h2>
    <p style="margin: 15px 0;">הזיני סיסמה כדי לנהל את הספרים</p>
    <input type="password" id="pass-input" placeholder="••••" style="padding:10px; border-radius:8px; border:none; margin-bottom:10px; text-align: center; letter-spacing: 6px;" onkeydown="if(event.key==='Enter')checkPass()">
    <button class="btn btn-add" onclick="checkPass()">כניסה</button>
</div>

<header class="header">
    <div>
        <h1>⚙️ ניהול יריד ספרים</h1>
        <p>שכבת ו' - ויצמן</p>
    </div>
</header>

<div class="admin-actions">
    <button class="btn btn-add" onclick="document.getElementById('add-modal').style.display='flex'">➕ הוסף ספר</button>
    <button class="btn btn-sort" id="btn-start-sort" onclick="startSorting()">🔃 סידור ידני</button>
    <button class="btn btn-save-sort" id="btn-save-sort" onclick="saveNewOrder()">✅ שמור סדר</button>
    <button class="btn btn-cancel-sort" id="btn-cancel-sort" onclick="cancelSorting()">ביטול</button>
</div>

<div id="books-container" class="book-grid">
    </div>

<div id="add-modal" class="modal">
    <div class="modal-content">
        <h3>➕ הוסף ספר חדש</h3>
        <div class="form-group" style="text-align: center;">
            <label for="fileInput" style="cursor: pointer; background: #fdf4ff; padding: 20px; display: block; border-radius: 10px; border: 2px dashed #c084fc;">
                <div style="font-size:2rem">📸</div>
                לחצי לבחירת תמונה
                <div style="font-size:11px;color:#aaa;margin-top:2px">קלוד יזהה את שם הספר אוטומטית</div>
            </label>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this.files[0])">
        </div>
        <div id="identStatus">⏳ מזהה שם ספר...</div>
        <div id="thumbGrid"></div>

        <div class="form-group">
            <label>שם הספר</label>
            <input type="text" id="newTitle">
        </div>
        <div class="form-group">
            <label>סופר/ת</label>
            <input type="text" id="newAuthor">
        </div>
        <div class="form-group">
            <label>מחיר ₪</label>
            <input type="number" id="newPrice" value="10">
        </div>
        <div class="form-group">
            <label>קטגוריה</label>
            <select id="newCategory">
                <option>ספרי ילדים</option>
                <option>פעוטות</option>
                <option>ראשית קריאה</option>
                <option>קומיקס</option>
                <option>ספרות נוער</option>
                <option>ספרי קריאה (למבוגרים)</option>
                <option>משחקים</option>
                <option>חוברות לימוד</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-add" style="flex: 1;" onclick="addOneBook()">הוסף לחנות</button>
            <button class="btn btn-cancel-sort" style="display: block;" onclick="document.getElementById('add-modal').style.display='none'">ביטול</button>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <h3>✏️ עריכת ספר</h3>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>שם הספר</label>
            <input type="text" id="edit-title">
        </div>
        <div class="form-group">
            <label>סופר/ת</label>
            <input type="text" id="edit-author">
        </div>
        <div class="form-group">
            <label>מחיר</label>
            <input type="number" id="edit-price">
        </div>
        <div class="form-group">
            <label>קטגוריה</label>
            <select id="edit-category">
                <option>ספרי ילדים</option>
                <option>פעוטות</option>
                <option>ראשית קריאה</option>
                <option>קומיקס</option>
                <option>ספרות נוער</option>
                <option>ספרי קריאה (למבוגרים)</option>
                <option>משחקים</option>
                <option>חוברות לימוד</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-add" style="flex: 1;" onclick="saveEdit()">שמור שינויים</button>
            <button class="btn btn-cancel-sort" style="display: block;" onclick="document.getElementById('edit-modal').style.display='none'">ביטול</button>
        </div>
    </div>
</div>

<script>
    // מנגנון סיסמה
    window.checkPass = function() {
        if(document.getElementById('pass-input').value === '1177') {
            document.getElementById('auth-overlay').style.display = 'none';
        } else {
            alert('סיסמה שגויה');
        }
    };
    var newBookImg = '';
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, addDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // הגדרות Firebase שהוצאו מהקובץ המקורי שלך
    const firebaseConfig = {
        apiKey: "AIzaSyCicKBTwcN1utsOAgKThEHjTAeovt4m_Ys",
        authDomain: "weizmannbook.firebaseapp.com",
        projectId: "weizmannbook",
        storageBucket: "weizmannbook.firebasestorage.app",
        messagingSenderId: "14338690162",
        appId: "1:14338690162:web:10c1f5a931a9f34dd806eb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const booksCol = collection(db, 'books');
    let sortableInstance = null;

    // טעינת ספרים מסודרת לפי orderIndex או הוספה
    const q = query(booksCol, orderBy("orderIndex", "asc"));
    onSnapshot(q, (snapshot) => {
        const books = [];
        snapshot.forEach(doc => books.push({ id: doc.id, ...doc.data() }));
        renderBooks(books);
    });

    function renderBooks(books) {
        const container = document.getElementById('books-container');
        container.innerHTML = books.map(book => `
            <div class="book-card" data-id="${book.id}">
                <div class="sort-handle">⠿</div>
                <div class="img-container">
                    <img src="${book.img || ''}" alt="${book.title}">
                </div>
                <div class="info">
                    <div class="title">${book.title}</div>
                    <div class="author">${book.author}</div>
                    <div class="price-badge">${book.price} ₪</div>
                </div>
                <div class="card-actions">
                    <button class="btn-icon" onclick="openEditModal('${book.id}', '${book.title}', '${book.author}', ${book.price}, '${book.cat[0]}')">✏️</button>
                    <button class="btn-icon" onclick="deleteBook('${book.id}')">🗑️</button>
                    <button class="btn-icon" onclick="toggleSold('${book.id}', ${book.sold})">${book.sold ? '✅' : '🏷️'}</button>
                </div>
            </div>
        `).join('');
    }

    // פונקציות מצב עריכת סדר
    window.startSorting = function() {
        document.body.classList.add('is-sorting');
        document.getElementById('btn-start-sort').style.display = 'none';
        document.getElementById('btn-save-sort').style.display = 'flex';
        document.getElementById('btn-cancel-sort').style.display = 'flex';
        
        const el = document.getElementById('books-container');
        sortableInstance = Sortable.create(el, {
            handle: '.sort-handle',
            animation: 150,
            ghostClass: 'sortable-ghost'
        });
    };

    window.cancelSorting = function() {
        location.reload(); 
    };

    window.saveNewOrder = async function() {
        const container = document.getElementById('books-container');
        const cards = Array.from(container.querySelectorAll('.book-card'));
        const batch = writeBatch(db);
        
        cards.forEach((card, index) => {
            const bookRef = doc(db, "books", card.dataset.id);
            batch.update(bookRef, { orderIndex: index });
        });

        try {
            await batch.commit();
            alert("הסדר החדש נשמר בהצלחה!");
            document.body.classList.remove('is-sorting');
            location.reload();
        } catch (e) {
            alert("שגיאה בשמירת הסדר: " + e.message);
        }
    };

    // פונקציות ניהול (מחיקה, סטטוס נמכר)
    window.deleteBook = async function(id) {
        if(confirm('למחוק את הספר?')) {
            await deleteDoc(doc(db, "books", id));
        }
    };

    window.toggleSold = async function(id, currentStatus) {
        const ref = doc(db, "books", id);
        await updateDoc(ref, { sold: !currentStatus });
    };

    // עריכת ספר
    window.openEditModal = function(id, title, author, price, category) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-title').value = title;
        document.getElementById('edit-author').value = author;
        document.getElementById('edit-price').value = price;
        document.getElementById('edit-category').value = category;
        document.getElementById('edit-modal').style.display = 'flex';
    };

    window.saveEdit = async function() {
        const id = document.getElementById('edit-id').value;
        const ref = doc(db, "books", id);
        await updateDoc(ref, {
            title: document.getElementById('edit-title').value,
            author: document.getElementById('edit-author').value,
            price: Number(document.getElementById('edit-price').value),
            cat: [document.getElementById('edit-category').value]
        });
        document.getElementById('edit-modal').style.display = 'none';
    };

    // הוספת ספר חדש
    window.addOneBook = async function() {
        const title = document.getElementById('newTitle').value;
        const author = document.getElementById('newAuthor').value;
        const price = Number(document.getElementById('newPrice').value);
        const category = document.getElementById('newCategory').value;

        if(!title) { alert('נא להזין שם ספר'); return; }
        
        try {
            await addDoc(booksCol, {
                title: title,
                author: author,
                price: price,
                cat: [category],
                img: newBookImg,
                sold: false,
                orderIndex: 999 // כדי שיופיעו בסוף עד שמסדרים ידנית
            });
            document.getElementById('add-modal').style.display = 'none';
            
            // ניקוי טופס הוספה
            document.getElementById('newTitle').value = '';
            document.getElementById('newAuthor').value = '';
            document.getElementById('thumbGrid').innerHTML = '';
            newBookImg = '';
        } catch (e) {
            alert('שגיאה בהוספת הספר: ' + e.message);
        }
    };

    // טיפול בתמונה ו-OCR מתוך הקוד המקורי
    window.handleFile = async function(f) {
        if(!f) return;
        const b64 = await toB64(f);
        newBookImg = await resizeImg(b64, 400);
        document.getElementById('thumbGrid').innerHTML = `<div class="thumb-wrap"><img src="${newBookImg}"></div>`;
        document.getElementById('identStatus').style.display = 'block';
        identifyBook(newBookImg).then(res => {
            document.getElementById('identStatus').style.display = 'none';
            if(res.title) document.getElementById('newTitle').value = res.title;
            if(res.author) document.getElementById('newAuthor').value = res.author;
        }).catch(() => {
            document.getElementById('identStatus').style.display = 'none';
        });
    };

    function toB64(f) {
        return new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = e => res(e.target.result);
            r.onerror = e => rej(e);
            r.readAsDataURL(f);
        });
    }

    function resizeImg(b64, max) {
        return new Promise((res) => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas');
                let w = img.width, h = img.height;
                if(w > h) { if(w > max) { h = Math.round(h *= max / w); w = max; } } 
                else { if(h > max) { w = Math.round(w *= max / h); h = max; } }
                cvs.width = w; cvs.height = h;
                cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                res(cvs.toDataURL('image/jpeg', 0.7));
            };
            img.src = b64;
        });
    }

    async function identifyBook(b64) {
        const sysMsg = "You are a Hebrew book identifier. Look at the book cover image and extract ONLY the book title and author in JSON format: {\"title\": \"Book Name\", \"author\": \"Author Name\"}. If you are not sure, make your best guess. Return ONLY valid JSON, nothing else.";
        const b64Data = b64.split(',')[1];
        
        const payload = {
            model: "claude-3-haiku-20240307",
            max_tokens: 150,
            system: sysMsg,
            messages: [{
                role: "user",
                content: [{
                    type: "image",
                    source: { type: "base64", media_type: "image/jpeg", data: b64Data }
                }]
            }]
        };

        // הערה: קריאת ה-API כאן היא מהקוד המקורי, יש לוודא שהמפתח תקין אם לא עבד קודם
        try {
            const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': "sk-ant-api03-Lh9e90OQy0nNezKkUq9B1Ea-mYQ8o8lR61mQ2N1ZgqP7T8mR41lT9P5Oq1l-K9W2v8Oq1l_mX-A9mY_P0-qZ1Q",
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify(payload)
            });
            const data = await resp.json();
            const txt = data.content[0].text;
            return JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
        } catch(e) {
            console.error('Claude API Error:', e);
            return {};
        }
    }

</script>
</body>
</html>
