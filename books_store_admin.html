<title>ניהול ספרים</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;min-height:100vh;background:#13595E;direction:rtl}
.header{background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);padding:1.2rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.25);position:sticky;top:0;z-index:10}
.header h1{font-size:1.5rem;color:white;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
.header p{font-size:.85rem;color:rgba(255,255,255,0.85);margin-top:2px}
.controls{padding:1rem 1.2rem;background:rgba(255,255,255,0.12);backdrop-filter:blur(6px);margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.2)}
.search{width:100%;padding:9px 12px;border:1.5px solid rgba(255,255,255,0.4);border-radius:10px;font-size:14px;background:rgba(255,255,255,0.25);color:white;margin-bottom:10px}
.search::placeholder{color:rgba(255,255,255,0.7)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:5px 14px;border:1.5px solid rgba(255,255,255,0.5);border-radius:20px;font-size:13px;background:rgba(255,255,255,0.15);color:white;cursor:pointer;transition:.15s}
.fb.active{background:white;color:#7c2fa0;border-color:white;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:14px}
.card{background:rgba(255,255,255,0.95);border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(100,0,150,0.2);position:relative;display:flex;flex-direction:column;cursor:pointer}

.card-img-wrap{position:relative}
.card img{width:100%;height:160px;object-fit:cover;display:block;transition:opacity .3s}
@media(min-width:600px){.card img{height:200px}}
.sold-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.45);align-items:center;justify-content:center}
.sold .sold-overlay{display:flex}
.sold img{opacity:0.5}
.sold-label{background:#ef4444;color:white;font-size:13px;font-weight:bold;padding:6px 18px;border-radius:20px}
.cb-wrap{display:none!important}

.cb-check{display:none}

.card-body{padding:10px;display:flex;flex-direction:column;flex:1}
.card-title{font-size:14px;font-weight:bold;color:#e1cd17;margin-bottom:2px;line-height:1.4;min-height:2.8em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-author{font-size:11px;color:#fff;margin-bottom:4px;min-height:1.4em}
.card-cats{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.cat-tag{font-size:10px;background:#D4EDE6;color:#5F443D;padding:4px 7px;border-radius:10px}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.price{font-size:15px;font-weight:bold;color:#7c2fa0}
.empty{text-align:center;padding:3rem;color:rgba(255,255,255,0.8);font-size:14px;grid-column:1/-1}
.loading{text-align:center;padding:3rem;color:rgba(255,255,255,0.8);font-size:14px;grid-column:1/-1}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:16px;padding:1.5rem;max-width:360px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1rem;margin-bottom:12px;color:#7c2fa0}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none}
.m-cancel{background:#f0f0f0;color:#555}


.admin-bar{background:rgba(0,0,0,0.2);padding:.6rem 1.2rem;font-size:13px;color:rgba(255,255,255,.9);border-bottom:1px solid rgba(255,255,255,0.15)}
.add-fab{background:white;color:#7c2fa0;border:none;border-radius:50%;width:54px;height:54px;font-size:26px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.3);position:fixed;bottom:22px;left:22px;z-index:100;font-weight:bold}
.panel-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center}
.panel-bg.open{display:flex}
.panel{background:white;width:100%;max-width:500px;border-radius:18px 18px 0 0;padding:1.5rem;max-height:88vh;overflow-y:auto}
.panel h2{font-size:1.1rem;margin-bottom:1rem;color:#7c2fa0}
.drop-zone{border:2px dashed #c084fc;border-radius:12px;padding:1.5rem;text-align:center;color:#9b30c8;cursor:pointer;background:#fdf4ff;margin-bottom:12px}
.drop-zone input{display:none}
.thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:12px}
.thumb-wrap{position:relative;border-radius:8px;overflow:hidden}
.thumb-wrap img{width:100%;height:80px;object-fit:cover}
.thumb-del{position:absolute;top:2px;left:2px;background:rgba(0,0,0,.6);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer}
.add-btn{background:linear-gradient(90deg,#7c2fa0,#d44f9e);color:white;border:none;border-radius:10px;padding:13px;width:100%;margin-top:14px;font-size:15px;cursor:pointer;font-weight:bold}
.cancel-btn{background:#f5f5f5;color:#555;border:1px solid #ddd;border-radius:10px;padding:10px;width:100%;margin-top:8px;font-size:14px;cursor:pointer}
.field-label{display:block;font-size:12px;color:#666;margin:10px 0 3px}
.field-input{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px}
.cats-check{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.cats-check label{display:flex;align-items:center;gap:4px;font-size:12px;background:#f3e8ff;color:#7c2fa0;padding:4px 10px;border-radius:12px;cursor:pointer}
.cats-check input[type=checkbox]{accent-color:#7c2fa0}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:rgba(255,255,255,.95);border-radius:18px;padding:2rem;max-width:300px;width:100%;text-align:center}
.login-box h2{color:#7c2fa0;margin-bottom:.5rem}
.login-box p{font-size:13px;color:#888;margin-bottom:1.2rem}
.login-box input{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:18px;margin-bottom:12px;text-align:center;letter-spacing:6px}
.login-btn{background:linear-gradient(90deg,#7c2fa0,#d44f9e);color:white;border:none;border-radius:10px;padding:12px;width:100%;font-size:15px;cursor:pointer;font-weight:bold}
.err{color:#ef4444;font-size:13px;margin-top:8px}
.processing{font-size:13px;color:#7c2fa0;text-align:center;padding:8px;display:none}

/* Edit Order Mode */
.edit-order-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-edit-order{background:rgba(255,255,255,0.2);color:white;border:1.5px solid rgba(255,255,255,0.6);border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer;font-weight:bold;transition:.2s}
.btn-edit-order:hover{background:rgba(255,255,255,0.35)}
.btn-save-order{background:#16a34a;color:white;border:none;border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer;font-weight:bold}
.btn-cancel-order{background:rgba(255,255,255,0.15);color:white;border:1.5px solid rgba(255,255,255,0.4);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer}
.drag-handle{position:absolute;top:8px;right:8px;z-index:10;background:rgba(0,0,0,0.45);color:white;border-radius:6px;padding:3px 7px;font-size:16px;cursor:grab;display:none;line-height:1;user-select:none}
.edit-order-active .drag-handle{display:block}
.edit-order-active .card{cursor:default!important}
.sortable-ghost{opacity:0.4;transform:scale(0.97)}
.sortable-chosen{box-shadow:0 8px 30px rgba(19,89,94,0.5)!important}
.card.order-mode-card .admin-btns button{pointer-events:none;opacity:0.4}
</style>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>🔒 כניסת מנהלת</h2>

  </div>
</div>

<div id="adminUI" style="display:none">
  <div class="header"><h1>⚙️ ניהול ספרים</h1><p>עמוד מנהלת</p></div>
  <div class="admin-bar" id="statsBar"></div>
  <div style="padding:.5rem 1.2rem;background:rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.15)">

<!-- Add panel -->
<div class="panel-bg" id="panelBg">

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()" style="margin-bottom:10px">
      <div style="font-size:2rem">📸</div>
      <div style="font-size:13px;margin-top:4px;font-weight:600;color:#654B44">לחצי לבחירת תמונה</div>
      <div style="font-size:11px;color:#aaa;margin-top:2px">קלוד יזהה את שם הספר אוטומטית</div>

    </div>
    <div id="thumbGrid" style="margin:8px 0"></div>
    <div id="identStatus" style="display:none;text-align:center;font-size:12px;color:#654B44;padding:6px;background:#f0faf6;border-radius:8px;margin-bottom:8px">⏳ מזהה שם ספר...</div>

    <label style="display:block;font-size:12px;color:#666;margin-bottom:3px;font-weight:600;margin-top:6px">שם הספר</label>

    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px">
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;background:#f3e8ff;color:#7c2fa0;padding:3px 8px;border-radius:10px;cursor:pointer"><input type="checkbox" class="ncat" value="ספרי ילדים"> ספרי ילדים</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;background:#f3e8ff;color:#7c2fa0;padding:3px 8px;border-radius:10px;cursor:pointer"><input type="checkbox" class="ncat" value="פעוטות"> פעוטות</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;background:#f3e8ff;color:#7c2fa0;padding:3px 8px;border-radius:10px;cursor:pointer"><input type="checkbox" class="ncat" value="ראשית קריאה"> ראשית קריאה</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;background:#f3e8ff;color:#7c2fa0;padding:3px 8px;border-radius:10px;cursor:pointer"><input type="checkbox" class="ncat" value="קומיקס"> קומיקס</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;background:#f3e8ff;color:#7c2fa0;padding:3px 8px;border-radius:10px;cursor:pointer"><input type="checkbox" class="ncat" value="ספרות נוער"> ספרות נוער</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;background:#f3e8ff;color:#7c2fa0;padding:3px 8px;border-radius:10px;cursor:pointer"><input type="checkbox" class="ncat" value="משחקים"> משחקים</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;background:#f3e8ff;color:#7c2fa0;padding:3px 8px;border-radius:10px;cursor:pointer"><input type="checkbox" class="ncat" value="חוברות לימוד"> חוברות לימוד</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;background:#f3e8ff;color:#7c2fa0;padding:3px 8px;border-radius:10px;cursor:pointer"><input type="checkbox" class="ncat" value="ספריית פיג'מה"> ספריית פיג'מה</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:11px;background:#f3e8ff;color:#7c2fa0;padding:3px 8px;border-radius:10px;cursor:pointer"><input type="checkbox" class="ncat" value="ספרים עבור מבוגרים"> ספרים עבור מבוגרים</label>

    <button class="add-btn" onclick="addOneBook()">✓ הוסף לחנות</button>

  </div>
</div>

<!-- Edit modal -->

    <div class="modal-btns">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCicKBTwcN1utsOAgKThEHjTAeovt4m_Ys",
  authDomain: "weizmannbook.firebaseapp.com",
  projectId: "weizmannbook",
  storageBucket: "weizmannbook.firebasestorage.app",
  messagingSenderId: "14338690162",
  appId: "1:14338690162:web:10c1f5a931a9f34dd806eb"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const booksCol = collection(db, 'books');

const CATS = ["ספרי ילדים", "פעוטות", "ראשית קריאה", "קומיקס", "ספרות נוער", "ספרים עבור מבוגרים", "משחקים", "חוברות לימוד", "ספריית פיג'מה"];
const ALL_CATS = ["הכל", "ספרי ילדים", "פעוטות", "ראשית קריאה", "קומיקס", "ספרות נוער", "ספרים עבור מבוגרים", "משחקים", "חוברות לימוד", "ספריית פיג'מה"];
const PHONE = "972544934904";

let books = [];
let activeFilter = "הכל";

function getCats(b){ return Array.isArray(b.cat) ? b.cat : [b.cat]; }
function matchFilter(b){ return activeFilter === "הכל" || getCats(b).includes(activeFilter); }

function buildFilters(id){
  document.getElementById(id).innerHTML = ALL_CATS.map(c =>
    `<button class="fb ${c===activeFilter?'active':''}" onclick="setFilter('${c}',this)">${c}</button>`
  ).join('');
}
function setFilter(cat, el){
  activeFilter = cat;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();

function checkPass(){
  if(document.getElementById('passInput').value === PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminUI').style.display='block';
    startListening();
  } else {
    document.getElementById('passErr').textContent='סיסמה שגויה';
  }
}

function startListening(){
  onSnapshot(booksCol, async (snap) => {
    if(snap.empty){
      // Seed initial books
      for(let i=0;i<SEED.length;i++){
        const b = SEED[i];
        await setDoc(doc(db,'books',String(b.id)), {...b, order:i});
      }
    } else {
      books = snap.docs.map(d => ({...d.data(), id: d.id}));
      books.sort((a,b) => (a.order||0) - (b.order||0));
      buildFilters('filters');
      render();
    }
  });
}

function cardHtml(b, isAdmin){
  const cats = getCats(b);
  const catTags = cats.map(c => `<span class="cat-tag">${c}</span>`).join('');
  const adminBtns = isAdmin ? `
    <div class="admin-btns" style="display:flex;gap:4px;margin-top:8px">
      <button onclick="event.stopPropagation();toggleSold('${b.id}')" style="flex:1;padding:6px 0;border:none;border-radius:7px;font-size:11px;cursor:pointer;font-weight:bold;background:${b.sold?'#dcfce7':'#fee2e2'};color:${b.sold?'#16a34a':'#ef4444'}">
        ${b.sold ? '↩ החזר' : '✓ נמכר'}
      </button>
      <button onclick="event.stopPropagation();openEditModal('${b.id}')" style="flex:1;padding:6px 0;border:none;border-radius:7px;font-size:11px;cursor:pointer;background:#f3e8ff;color:#7c2fa0;font-weight:bold">
        ✏️
      </button>
      <button onclick="event.stopPropagation();deleteBook('${b.id}')" style="flex:0 0 32px;padding:6px 0;border:none;border-radius:7px;font-size:11px;cursor:pointer;background:#fee2e2;color:#b91c1c;font-weight:bold">
        🗑
      </button>
    </div>` : '';
  return `
    <div class="card ${b.sold?'sold':''} ${editOrderMode?'order-mode-card':''}" data-id="${b.id}">
      <div class="drag-handle" title="גרור לסידור">⠿</div>

        <div class="card-footer"><span class="price">&#8362;${b.price}</span></div>

      </div>
    </div>`;
}

function readFileAsDataURL(file){
  return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
}
function resizeImage(dataUrl,maxSize){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>h){if(w>maxSize*2){h=h*maxSize*2/w;w=maxSize*2;}}
      else{if(h>maxSize*2){w=w*maxSize*2/h;h=maxSize*2;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      res(canvas.toDataURL('image/jpeg',0.75));
    };
    img.src=dataUrl;
  });
}

let editOrderMode = false;
let sortableInstance = null;
let originalOrder = [];

function startEditOrder(){
  editOrderMode = true;
  originalOrder = books.map(b => b.id);
  document.getElementById('btnEditOrder').style.display = 'none';
  document.getElementById('btnSaveOrder').style.display = 'inline-block';
  document.getElementById('btnCancelOrder').style.display = 'inline-block';
  document.getElementById('orderModeLabel').style.display = 'inline';
  document.getElementById('grid').classList.add('edit-order-active');
  render();
  sortableInstance = new Sortable(document.getElementById('grid'), {
    animation: 150,
    handle: '.drag-handle',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd: function(){
      const newOrder = [...document.querySelectorAll('#grid .card')].map(el => el.dataset.id);
      const booksMap = {};
      books.forEach(b => booksMap[b.id] = b);
      books = newOrder.map(id => booksMap[id]).filter(Boolean);
    }
  });
}

function cancelEditOrder(){
  const booksMap = {};
  books.forEach(b => booksMap[b.id] = b);
  books = originalOrder.map(id => booksMap[id]).filter(Boolean);
  destroySortable();
  exitOrderMode();
  render();
}

function destroySortable(){
  if(sortableInstance){ sortableInstance.destroy(); sortableInstance = null; }
}

function exitOrderMode(){
  editOrderMode = false;
  document.getElementById('btnEditOrder').style.display = 'inline-block';
  document.getElementById('btnSaveOrder').style.display = 'none';
  document.getElementById('btnCancelOrder').style.display = 'none';
  document.getElementById('orderModeLabel').style.display = 'none';
  document.getElementById('grid').classList.remove('edit-order-active');
}

async function saveOrder(){
  try {
    document.getElementById('btnSaveOrder').textContent = '⏳ שומר...';
    document.getElementById('btnSaveOrder').disabled = true;
    const promises = books.map((b, index) =>
      updateDoc(doc(db, 'books', b.id), { order: index })
    );
    await Promise.all(promises);
    destroySortable();
    exitOrderMode();
    render();
    const bar = document.getElementById('statsBar');
    const orig = bar.textContent;
    bar.textContent = '✅ הסדר נשמר בהצלחה!';
    setTimeout(() => { bar.textContent = orig; }, 2000);
    document.getElementById('btnSaveOrder').textContent = '💾 שמור סדר חדש';
    document.getElementById('btnSaveOrder').disabled = false;
  } catch(e) {
    alert('שגיאה בשמירה: ' + e.message);
    document.getElementById('btnSaveOrder').textContent = '💾 שמור סדר חדש';
    document.getElementById('btnSaveOrder').disabled = false;
  }
}
